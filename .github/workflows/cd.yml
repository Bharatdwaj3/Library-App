name: CD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        run: |
          echo "Triggering deployment to Render..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" --fail-with-body