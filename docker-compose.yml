

services:

  honji:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: honji-app
    ports:
      - "5112:3000"
    
    env_file:
      - .env.production
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

    logging:
      driver: json-file
      options:
        max-size: "28m"
        max-file: "5"
        compress: "true"
    
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: "0.75"
    tmpfs: 
      - /tmp:size=64m,noexec,nosuid

  redis: 
    image: redis:7-alpine
    container_name: honji-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - honji-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  honji-network:
    driver: bridge

volumes:
  redis_data: